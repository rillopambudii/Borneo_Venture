<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking - Borneo Venture</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: "Montserrat", sans-serif;
        background: #0b1a12;
        color: white;
      }

      header {
        height: 50vh;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)),
          url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
        background-size: cover;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      header h1 {
        font-size: 2.5rem;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        padding: 40px 20px;
      }

      .trips {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .trip {
        background: #10251a;
        border-radius: 15px;
        overflow: hidden;
      }

      .trip img {
        width: 100%;
        height: 150px;
        object-fit: cover;
      }

      .trip div {
        padding: 15px;
      }

      .trip h3 {
        margin-bottom: 10px;
      }

      form {
        background: #10251a;
        padding: 25px;
        border-radius: 15px;
      }

      form input,
      form select {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
      }

      button {
        width: 100%;
        padding: 15px;
        background: #2e7d32;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 30px;
        cursor: pointer;
      }

      button:hover {
        background: #388e3c;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Booking Petualanganmu</h1>
    </header>

    <div class="container">
      <h2>Pilih Trip</h2>
      <div class="trips">
        <div class="trip">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
          />
          <div>
            <h3>Desa Bhuana Jaya</h3>
            <p>2 Hari 1 Malam</p>
          </div>
        </div>

        <div class="trip">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
          />
          <div>
            <h3>Bukit Mahoni</h3>
            <p>3 Hari 2 Malam</p>
          </div>
        </div>

        <div class="trip">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
          />
          <div>
            <h3>Goa Batu Gelap</h3>
            <p>1 Hari</p>
          </div>
        </div>
      </div>
      
       <div class="container">
      <h2>Pilih Trip</h2>
      <div class="trips">
        <div class="trip">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
          />
          <div>
            <h3>Desa Bhuana Jaya</h3>
            <p>2 Hari 1 Malam</p>
          </div>
        </div>

        <div class="trip">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
          />
          <div>
            <h3>Bukit Mahoni</h3>
            <p>3 Hari 2 Malam</p>
          </div>
        </div>

        <div class="trip">
          <img
            src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e"
          />
          <div>
            <h3>Goa Batu Gelap</h3>
            <p>1 Hari</p>
          </div>
        </div>
      </div>
      

      <h2>Form Booking</h2>
      <form>
        <input type="text" placeholder="Nama Lengkap" required />
        <input type="email" placeholder="Email" required />
        <input type="text" placeholder="Nomor WhatsApp" required />

        <select>
          <option>Pilih Trip</option>
          <option>Sungai Mahakam</option>
          <option>Hutan Tropis</option>
          <option>Orangutan Experience</option>
        </select>

        <input type="number" placeholder="Jumlah Orang" />
        <input type="date" />

        <button type="submit">Mulai Ekspedisi</button>
      </form>
    </div>
  </body>
</html>
